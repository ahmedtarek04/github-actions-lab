name: Run Automated Tests

on: [push, pull_request]

jobs:
  test:
    # 1. You must specify the operating system runner
    runs-on: ubuntu-latest

    steps:
      # 2. Always checkout the repository first
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 3. Set up the environment (Python)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # 5. Run tests (generate the results file)
      - name: Run pytest (generate junit xml)
        # Note: Added a check to make sure scripts/ exists, or change to .
        run: pytest -v --junitxml=results.xml

      # 6. Upload the results even if the previous step failed
      - name: Upload test report artifact
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: results.xml
